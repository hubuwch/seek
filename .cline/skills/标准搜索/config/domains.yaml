# 标准搜索技能 - 领域映射配置
# 此文件定义了不同领域类别及其对应的关键词和配置

# 领域类别配置
domains:
  # 编程技术领域
  programming:
    name: "编程技术"
    description: "编程语言、框架、工具、算法等相关技术问题"
    keywords:
      - "Python"
      - "JavaScript"
      - "Java"
      - "C++"
      - "Docker"
      - "Kubernetes"
      - "API"
      - "框架"
      - "算法"
      - "数据结构"
      - "数据库"
      - "前端"
      - "后端"
      - "开发"
      - "代码"
    answer_types:
      - "步骤"
      - "故障排查"
      - "定义"
      - "对比"
    priority: 1
    enabled: true

  # 政策法规领域
  policy:
    name: "政策法规"
    description: "法律法规、政策文件、规章制度等官方文档"
    keywords:
      - "法律"
      - "法规"
      - "政策"
      - "条例"
      - "办法"
      - "规定"
      - "合规"
      - "监管"
      - "政府"
      - "官方"
      - "文件"
      - "标准"
    answer_types:
      - "定义"
      - "列举"
      - "数据"
    priority: 2
    enabled: true

  # 学术文献领域
  academic:
    name: "学术文献"
    description: "学术论文、研究报告、科学文献等学术内容"
    keywords:
      - "论文"
      - "研究"
      - "学术"
      - "文献"
      - "期刊"
      - "会议"
      - "科学"
      - "技术"
      - "理论"
      - "模型"
      - "算法"
      - "实验"
    answer_types:
      - "定义"
      - "对比"
      - "数据"
    priority: 3
    enabled: true

  # 行业数据领域
  industry:
    name: "行业数据"
    description: "行业统计、市场数据、经济指标等数据信息"
    keywords:
      - "数据"
      - "统计"
      - "市场"
      - "行业"
      - "经济"
      - "指标"
      - "报告"
      - "分析"
      - "趋势"
      - "预测"
      - "销量"
      - "份额"
    answer_types:
      - "数据"
      - "对比"
      - "列举"
    priority: 4
    enabled: true

  # 通用百科领域
  general:
    name: "通用百科"
    description: "通用知识、百科信息、基础概念等"
    keywords:
      - "什么是"
      - "定义"
      - "概念"
      - "原理"
      - "介绍"
      - "百科"
      - "知识"
      - "基础"
      - "入门"
    answer_types:
      - "定义"
      - "列举"
    priority: 5
    enabled: true

  # Linux/服务器领域
  linux:
    name: "Linux/服务器"
    description: "Linux系统、服务器配置、运维等相关问题"
    keywords:
      - "Linux"
      - "Ubuntu"
      - "CentOS"
      - "服务器"
      - "运维"
      - "部署"
      - "配置"
      - "命令"
      - "Shell"
      - "Nginx"
      - "Apache"
      - "Docker"
    answer_types:
      - "步骤"
      - "故障排查"
      - "定义"
    priority: 6
    enabled: true

# 默认领域配置
defaults:
  default_domain: "general"
  fallback_strategy: "keyword_match"
  confidence_threshold: 0.3
  max_domains_per_query: 2

# 领域检测配置
detection:
  use_keyword_matching: true
  use_ml_classification: false
  keyword_match_threshold: 2
  enable_fuzzy_matching: true
  fuzzy_match_threshold: 0.7

# 领域优先级配置
priorities:
  exact_match: 10
  keyword_match: 5
  fuzzy_match: 3
  fallback: 1